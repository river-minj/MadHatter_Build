<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Unity WebGL Player | MadHatter</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #231F20;
    }

    #unity-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #231F20;
    }

    #unity-canvas {
      background: #231F20;
      display: block;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <script src="Build/WebGL.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const ASPECT = 9 / 16;  // 9:16 세로 비율

    function resizeCanvas() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const screenRatio = w / h;

      let canvasW, canvasH;
      if (screenRatio > ASPECT) {
        // 화면이 더 가로로 길면 → 세로에 맞춤
        canvasH = h;
        canvasW = h * ASPECT;
      } else {
        // 화면이 더 세로로 길면 → 가로에 맞춤
        canvasW = w;
        canvasH = w / ASPECT;
      }
      canvas.style.width = canvasW + "px";
      canvas.style.height = canvasH + "px";
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    createUnityInstance(canvas, {
      dataUrl: "Build/WebGL.data.unityweb",
      frameworkUrl: "Build/WebGL.framework.js.unityweb",
      codeUrl: "Build/WebGL.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "MadHatter",
      productVersion: "1.0",
    });
  </script>
</body>
